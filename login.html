<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>로그인 - 보험 모의고사</title>
<meta name="theme-color" content="#3182f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">보험 모의고사</div>
      <div class="login-desc">3,210문항 실전 연습 + AI 해설로 자격시험 합격률을 높이세요</div>
    </div>

    <div class="card" style="padding:28px">
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div style="margin-bottom:12px">
          <label class="label" for="userId">아이디</label>
          <input type="text" id="userId" class="input" placeholder="아이디 입력" required autocomplete="username">
        </div>
        <div style="margin-bottom:12px">
          <label class="label" for="password">비밀번호</label>
          <input type="password" id="password" class="input" placeholder="비밀번호" required autocomplete="current-password" minlength="6">
        </div>
        <div id="errorMsg" style="display:none;color:var(--red);font-size:13px;margin-bottom:12px;padding:8px 12px;background:#fff1f2;border-radius:8px"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn">로그인</button>
      </form>
    </div>

    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--gray-500)">
      데이터는 안전하게 암호화되어 저장됩니다
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script>
// 이미 로그인되어 있으면 리디렉트
(async () => {
  const { data: { session } } = await _supabase.auth.getSession();
  if (session) {
    const { data: profile } = await _supabase.from('profiles').select('role').eq('id', session.user.id).single();
    if (profile) {
      window.location.href = profile.role === 'admin' ? 'admin.html' : 'index.html';
    }
  }
})();

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('userId').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.textContent = '로그인 중...';
  errEl.style.display = 'none';

  try {
    const { data, error } = await _supabase.auth.signInWithPassword({
      email: toAuthEmail(username),
      password,
    });
    if (error) throw error;

    const { data: profile } = await _supabase.from('profiles').select('role, is_active').eq('id', data.user.id).single();
    if (profile && !profile.is_active) {
      await _supabase.auth.signOut();
      throw new Error('계정이 비활성화되었습니다. 관리자에게 문의하세요.');
    }
    window.location.href = profile?.role === 'admin' ? 'admin.html' : 'index.html';
  } catch (err) {
    errEl.textContent = err.message === 'Invalid login credentials'
      ? '아이디 또는 비밀번호가 올바르지 않습니다.'
      : err.message;
    errEl.style.display = '';
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}
</script>
</body>
</html>
