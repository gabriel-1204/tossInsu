<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>시험 결과 - 손해보험 모의고사</title>
<meta name="theme-color" content="#3182f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="btn btn-secondary" style="padding:6px 14px;font-size:13px;font-weight:600;">← 홈</a>
    <span class="header-title">시험 결과</span>
    <span></span>
  </div>
</header>

<div class="container" style="padding-top:16px; padding-bottom:40px">

  <!-- 점수 카드 -->
  <div class="card score-card">
    <div class="score-big" id="scoreDisplay">-</div>
    <div class="score-label">점 (<span id="correctCount">0</span>/<span id="totalCount">0</span> 정답)</div>
    <div class="score-meta" id="scoreMeta"></div>
  </div>

  <!-- 과목별 점수 (실전 모의고사일 때만) -->
  <div id="subjectScores" style="display:none">
    <div class="card" style="padding:16px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">과목별 채점</div>
      <div id="subjectScoreList"></div>
      <div id="passResult" style="margin-top:12px;padding:12px;border-radius:10px;text-align:center;font-weight:700;font-size:15px"></div>
    </div>
  </div>

  <!-- 액션 버튼 -->
  <div class="action-row">
    <button class="btn btn-primary btn-full" onclick="retryWrong()" id="retryWrongBtn">
      🔁 오답만 다시 풀기
    </button>
    <button class="btn btn-outline btn-full" onclick="retryAll()">
      📝 전체 모의고사 다시 풀기
    </button>
  </div>

  <!-- 오답 목록 -->
  <div class="section-title" style="margin-top:28px">오답 목록</div>
  <div id="wrongList"></div>

  <!-- 정답 목록 (접기) -->
  <div style="margin-top:8px">
    <button class="btn btn-secondary btn-full" onclick="toggleCorrect()" id="toggleCorrectBtn">
      ✅ 정답 목록 보기
    </button>
    <div id="correctList" style="display:none;margin-top:8px"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data/questions.js"></script>
<script src="data/변액보험_questions.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/result.js"></script>
</body>
</html>
