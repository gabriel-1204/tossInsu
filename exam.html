<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>시험 진행중 - 손해보험 모의고사</title>
<meta name="theme-color" content="#3182f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="btn btn-secondary" style="padding:6px 14px;font-size:13px;font-weight:600;" onclick="return confirmLeave()">← 나가기</a>
    <span id="headerTitle" class="header-sub"></span>
    <span id="answeredCount" style="font-size:13px;font-weight:700;color:var(--blue)"></span>
  </div>
</header>

<div id="timerBar" class="timer-bar">50:00</div>

<div class="container" style="padding-top:16px; padding-bottom:120px">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">0 / 0 답변</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="questionsContainer"></div>
</div>

<div class="float-bar">
  <div class="float-bar-inner">
    <button class="btn btn-primary" onclick="submitExam()">제출하기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data/questions.js"></script>
<script src="data/변액보험_questions.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/exam.js"></script>
</body>
</html>
